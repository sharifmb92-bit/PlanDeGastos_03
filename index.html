<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Mensual de Gastos</title>
    
    <!-- Configuración PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg-dark: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            /* Paleta solicitada */
            --panel-verde: #1b4d3e;       /* Izquierda */
            --panel-negro: #121212;       /* Centro */
            --panel-naranja: #cc5a01;     /* Derecha */
            
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: clamp(10px, 3vw, 24px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
            text-align: left;
        }

        .dashboard-grid {
            display: grid;
            /* Forzamos 3 columnas en desktop */
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .panel {
            border-radius: 20px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            min-height: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ORDEN SOLICITADO */
        .panel-basics { background-color: var(--panel-verde); order: 1; }
        .panel-equilibrium { background-color: var(--panel-negro); order: 2; border: 1px solid #444; }
        .panel-variable { background-color: var(--panel-naranja); order: 3; }

        .panel-title {
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Gráfico Circular Centro */
        .chart-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto;
        }
        .svg-chart { transform: rotate(-90deg); width: 100%; height: 100%; }
        .chart-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
        .chart-progress {
            fill: none;
            stroke: #ffffff;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s ease;
        }

        .panel-amount-display { font-size: 38px; font-weight: 800; margin-top: auto; letter-spacing: -1.5px; }

        /* Checklist Izquierda */
        .checklist-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .check-circle {
            width: 24px; height: 24px; border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .check-circle.active { background: white; color: black; border-color: white; }

        /* Barras Derecha */
        .bars-chart {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            height: 100px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .bar { flex: 1; border-radius: 5px 5px 0 0; background: rgba(255,255,255,0.2); transition: height 0.6s ease; }
        .bar-fill { background: white; }

        /* Formularios abajo */
        .bottom-section {
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .input-card {
            background: var(--card-bg-dark);
            padding: 18px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }

        button.btn-add {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .recent-list { margin-top: 15px; max-height: 120px; overflow-y: auto; font-size: 13px; }
        .recent-item { 
            display: flex; justify-content: space-between; 
            padding: 8px; background: rgba(0,0,0,0.3); 
            border-radius: 6px; margin-bottom: 5px;
        }

        .menu-btns {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 style="font-size: 24px;">🏦 Mi Plan de Gastos</h1>
    </header>

    <main class="dashboard-grid">
        
        <!-- IZQUIERDA: GASTOS FIJOS (VERDE) -->
        <section class="panel panel-basics">
            <div class="panel-title">Gastos Fijos (50%)</div>
            <div id="list-fijos"></div>
            <div style="margin-top: auto; font-size: 12px; opacity: 0.8;" id="txt-fijos-info"></div>
        </section>

        <!-- CENTRO: EQUILIBRIO (NEGRO) -->
        <section class="panel panel-equilibrium">
            <div class="panel-title">Disponible Real</div>
            <div class="chart-container">
                <svg class="svg-chart" viewBox="0 0 160 160">
                    <circle class="chart-bg" cx="80" cy="80" r="70"></circle>
                    <circle id="circle-progress" class="chart-progress" cx="80" cy="80" r="70"></circle>
                </svg>
            </div>
            <div class="panel-amount-display" id="display-global">0.00 €</div>
        </section>

        <!-- DERECHA: VARIABLE (NARANJA) -->
        <section class="panel panel-variable">
            <div class="panel-title">Dinámico y Ahorro</div>
            <div class="bars-chart">
                <div class="bar bar-fill" id="bar-v"></div>
                <div class="bar bar-fill" id="bar-a" style="opacity: 0.5;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span id="label-v" style="font-size: 14px; font-weight: bold;">0€</span>
                <span id="label-a" style="font-size: 14px; font-weight: bold;">0€</span>
            </div>
            <div class="recent-list" id="recent-log"></div>
        </section>

    </main>

    <div class="bottom-section">
        <div class="input-card">
            <div class="panel-title" style="margin-bottom: 10px;">🟠 Gasto Variable</div>
            <input type="number" id="in-g-amt" placeholder="Importe €" inputmode="decimal">
            <input type="text" id="in-g-desc" placeholder="Concepto...">
            <button onclick="addMov('gasto')" class="btn-add" style="background: var(--panel-naranja); color: white;">Registrar Gasto</button>
        </div>

        <div class="input-card">
            <div class="panel-title" style="margin-bottom: 10px;">🟢 Ingreso Extra</div>
            <input type="number" id="in-i-amt" placeholder="Importe €" inputmode="decimal">
            <input type="text" id="in-i-desc" placeholder="Origen...">
            <button onclick="addMov('ingreso')" class="btn-add" style="background: var(--panel-verde); color: white;">Registrar Ingreso</button>
        </div>

        <div class="menu-btns">
            <button onclick="document.getElementById('m-cfg').style.display='flex'" style="background:none; border:1px solid #444; color:white; padding:10px; border-radius:8px; cursor:pointer;">⚙️ Ajustes</button>
            <button onclick="resetMes()" style="background:none; border:1px solid #444; color: #ff6b6b; padding:10px; border-radius:8px; cursor:pointer;">🗑️ Reiniciar Mes</button>
        </div>
    </div>

    <!-- MODAL AJUSTES -->
    <div class="modal" id="m-cfg">
        <div class="modal-content">
            <h2 style="margin-bottom: 15px;">Configuración</h2>
            <label>Nómina Mensual (€)</label>
            <input type="number" id="cfg-nom">
            <p style="font-size: 12px; margin-top: 10px; font-weight: bold;">Gastos Fijos</p>
            <div id="cfg-fijos-inputs">
                <!-- 4 inputs de fijos -->
                <input type="number" id="f-v1" placeholder="Fijo 1 €">
                <input type="number" id="f-v2" placeholder="Fijo 2 €">
                <input type="number" id="f-v3" placeholder="Fijo 3 €">
                <input type="number" id="f-v4" placeholder="Fijo 4 €">
            </div>
            <button onclick="saveCfg()" style="width:100%; padding:12px; margin-top:15px; background:white; color:black; border:none; border-radius:8px; font-weight:bold;">Guardar y Cerrar</button>
        </div>
    </div>

    <script>
        let db = {
            config: { nomina: 2000, fijos: [700, 150, 300, 50] },
            pagados: [],
            historial: []
        };

        function init() {
            const data = localStorage.getItem('pwa_gastos_v10');
            if(data) db = JSON.parse(data);
            render();
        }

        function save() {
            localStorage.setItem('pwa_gastos_v10', JSON.stringify(db));
            render();
        }

        function render() {
            let ingresosExtra = 0, gastosVar = 0;
            db.historial.forEach(h => {
                if(h.tipo === 'ingreso') ingresosExtra += h.amt;
                else gastosVar += h.amt;
            });

            const totalMalla = db.config.nomina + ingresosExtra;
            const limFijos = totalMalla * 0.5;
            const limVar = totalMalla * 0.3;
            const bolsaAhorro = totalMalla * 0.2;

            // Fijos (Izquierda)
            const listFijos = document.getElementById('list-fijos');
            listFijos.innerHTML = '';
            let sumaFijos = 0, pendientesFijos = 0;
            db.config.fijos.forEach((f, i) => {
                sumaFijos += f;
                const isPagado = db.pagados.includes(i);
                if(!isPagado) pendientesFijos += f;
                listFijos.innerHTML += `
                    <div class="checklist-row">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="check-circle ${isPagado?'active':''}" onclick="toggleFijo(${i})">${isPagado?'✓':''}</div>
                            <span>Gasto ${i+1}</span>
                        </div>
                        <span style="font-weight:bold;">${f}€</span>
                    </div>
                `;
            });
            document.getElementById('txt-fijos-info').innerText = `Total: ${sumaFijos}€ / Límite: ${limFijos.toFixed(0)}€`;

            // Balance (Centro)
            const disponibleVar = limVar - gastosVar;
            const global = pendientesFijos + disponibleVar;
            document.getElementById('display-global').innerText = global.toFixed(2) + ' €';
            
            const pct = Math.min(global / (limFijos + limVar), 1);
            document.getElementById('circle-progress').style.strokeDashoffset = 440 - (440 * pct);

            // Variable (Derecha)
            document.getElementById('bar-v').style.height = Math.min((gastosVar/limVar)*100, 100) + '%';
            document.getElementById('bar-a').style.height = '100%';
            document.getElementById('label-v').innerText = `Var: ${disponibleVar.toFixed(0)}€`;
            document.getElementById('label-a').innerText = `Ahorro: ${bolsaAhorro.toFixed(0)}€`;

            const log = document.getElementById('recent-log');
            log.innerHTML = db.historial.slice(0,10).map((h, i) => `
                <div class="recent-item">
                    <span>${h.tipo==='ingreso'?'🟢':'🟠'} ${h.desc}</span>
                    <span style="font-weight:bold">${h.amt}€</span>
                </div>
            `).join('');
        }

        function addMov(tipo) {
            const amt = parseFloat(document.getElementById(`in-${tipo==='ingreso'?'i':'g'}-amt`).value);
            const desc = document.getElementById(`in-${tipo==='ingreso'?'i':'g'}-desc`).value || 'Movimiento';
            if(amt > 0) {
                db.historial.unshift({ tipo, amt, desc });
                document.getElementById(`in-${tipo==='ingreso'?'i':'g'}-amt`).value = '';
                document.getElementById(`in-${tipo==='ingreso'?'i':'g'}-desc`).value = '';
                save();
            }
        }

        function toggleFijo(i) {
            const idx = db.pagados.indexOf(i);
            if(idx > -1) db.pagados.splice(idx, 1);
            else db.pagados.push(i);
            save();
        }

        function saveCfg() {
            db.config.nomina = parseFloat(document.getElementById('cfg-nom').value) || 0;
            db.config.fijos = [
                parseFloat(document.getElementById('f-v1').value) || 0,
                parseFloat(document.getElementById('f-v2').value) || 0,
                parseFloat(document.getElementById('f-v3').value) || 0,
                parseFloat(document.getElementById('f-v4').value) || 0
            ];
            document.getElementById('m-cfg').style.display='none';
            save();
        }

        function resetMes() {
            if(confirm("¿Reiniciar pagos e historial del mes?")) {
                db.pagados = [];
                db.historial = [];
                save();
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.onload = init;
    </script>
</body>
</html>
